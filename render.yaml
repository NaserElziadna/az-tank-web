# Render deploy: a single Node web service that builds the client and serves
# both the static bundle and the WebSocket game server on the same port.
# Render injects PORT; the server reads it. Free instances sleep when idle.
services:
  - type: web
    name: az-tank
    runtime: node
    plan: free
    # --include=dev so Vite (a devDependency) is installed even if Render sets
    # NODE_ENV=production during the build.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true
