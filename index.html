<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover is required for env(safe-area-inset-*) to resolve to
         non-zero on notched phones (the HUD/touch buttons rely on it). -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#15171c" />
    <title>AZ Tank — bounce-shot tank battles</title>
    <meta name="description" content="Fast top-down tank battles in a fresh maze every round. Bank your shots off the walls — and watch your own ricochets. Play solo vs bots or online with friends." />
    <!-- Installable web app (PWA): standalone, landscape, home-screen icon. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AZ Tank" />
    <link rel="icon" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
  </head>
  <body>
    <div id="app">
      <!-- The application mounts its screens (menu, setup, game) here. -->
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
